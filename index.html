    lactancia: { titulo: "Lactancia materna", items: ["Leche materna exclusiva hasta los 6 meses. Ningún sólido antes, aunque el bebé mire la comida, babee o parezca interesado: no son señales de que esté listo.", "Puede haber una crisis de crecimiento alrededor de las 13 semanas.", "A los 3 meses los bebés se distraen mucho mamando. Si suelta el pecho para mirar alrededor, es desarrollo normal, no rechazo."] },

  }
};

function getWeekData(weekNum) {
  const keys = Object.keys(weeklyData).map(Number).sort((a,b) => a-b);
  let closest = keys[0];
  for (const k of keys) { if (k <= weekNum) closest = k; }
  return weeklyData[closest];
}

function render() {
  const now = new Date();
  const totalDays = Math.floor((now - BIRTH_DATE) / (1000 * 60 * 60 * 24));
  const weekNum = Math.floor(totalDays / 7);
  const months = Math.floor(totalDays / 30);
  const remainingDays = totalDays % 30;

  document.getElementById('daysDisplay').innerHTML = totalDays + '<span> días</span>';
  document.getElementById('weeksMonthsDisplay').textContent = months > 0
    ? months + (months === 1 ? ' mes' : ' meses') + (remainingDays > 0 ? ' y ' + remainingDays + ' días' : '') + ' · semana ' + (weekNum + 1)
    : 'Semana ' + (weekNum + 1) + ' de vida';
  document.getElementById('weekBadge').textContent = 'Semana ' + (weekNum + 1);

  const data = getWeekData(weekNum);
  const sections = [
    { icon: '🌱', iconClass: 'icon-desarrollo', title: data.desarrollo.titulo, content: '<ul class="item-list">' + data.desarrollo.items.map(i => '<li>' + i + '</li>').join('') + '</ul>' },
    { icon: '🌙', iconClass: 'icon-sueno', title: data.sueno.titulo, content: '<ul class="item-list">' + data.sueno.items.map(i => '<li>' + i + '</li>').join('') + '</ul>' },
    { icon: '🤱', iconClass: 'icon-lactancia', title: data.lactancia.titulo, content: '<ul class="item-list">' + data.lactancia.items.map(i => '<li>' + i + '</li>').join('') + '</ul>' },
    { icon: '⚡', iconClass: 'icon-alerta', title: 'Consulta con el pediatra si...', isAlert: true, content: data.alerta },
    { icon: '💚', iconClass: 'icon-consejo', title: 'Consejo de la semana', isTip: true, content: data.consejo }
  ];

  document.getElementById('content').innerHTML = sections.map((s, i) =>
    '<div class="section" style="animation-delay:' + (0.3 + i * 0.1) + 's">' +
    '<div class="section-header"><div class="section-icon ' + s.iconClass + '">' + s.icon + '</div><h2 class="section-title">' + s.title + '</h2></div>' +
    (s.isAlert ? '<div class="alert-card">' + s.content + '</div>' : s.isTip ? '<div class="tip-card"><p>' + s.content + '</p></div>' : '<div class="card">' + s.content + '</div>') +
    '</div>'
  ).join('');
}
render();
</script>
